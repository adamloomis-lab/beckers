<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Becker's Restaurant | Homestyle Cooking in Ashtabula, OH</title>
    <meta
      name="description"
      content="Becker's Restaurant in Ashtabula, OH. Breakfast, lunch, and dinner served seven days a week. Big portions, real homestyle cooking, and a warm, family-friendly table. Call (440) 993-1131." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#341a2e" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
    <!--SEO_HEAD-->
    <!-- Self-hosted accessibility comfort toolbar (font size, contrast, links,
         spacing). Themed to the Becker's plum brand. -->
    <script defer src="/accessibility-widget.js" data-accent="#4a2440" data-position="left"></script>
    <!-- Gate scroll-reveal styles on JS so no-JS / failed-bundle visitors see all content. -->
    <script>
      document.documentElement.classList.add('reveal-ready')
    </script>
  </head>
  <body>
    <!-- Hidden static forms so Netlify detects them (and their fields) at build
         time. The live React forms post to these names. -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>
    <form name="application" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="position" />
      <textarea name="message"></textarea>
    </form>
    <form name="catering" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="eventDate" />
      <input type="text" name="guests" />
      <input type="text" name="eventType" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
